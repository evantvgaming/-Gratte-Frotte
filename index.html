<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Scratch Life</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#101820;
  color:white;
  overflow-x:hidden;
}
.game{
  display:grid;
  grid-template-columns:270px 1fr 280px;
  min-height:100vh;
}
.left,.right{
  background:#101722;
  padding:12px;
  border-right:3px solid #05080d;
}
.right{border-right:0;border-left:3px solid #05080d}
.money{
  font-size:30px;
  color:#ffd43b;
  font-weight:bold;
}
button{
  border:0;
  border-radius:8px;
  padding:10px;
  margin:5px;
  font-weight:bold;
  cursor:pointer;
}
.tab{background:#2364aa;color:white;width:45%}
.item{
  display:flex;
  gap:10px;
  align-items:center;
  background:#17263a;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  cursor:pointer;
  border:2px solid transparent;
}
.item.active{border-color:#ffd43b;background:#244b80}
.item.locked{opacity:.45}
.icon{
  width:55px;height:55px;
  background:#0b3d70;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
}
.main{
  background:#3b2a1d;
  padding:25px;
  position:relative;
}
.shop{
  background:#8b5a32;
  border:10px solid #5c351e;
  border-radius:18px;
  min-height:680px;
  padding:25px;
  box-shadow:inset 0 0 30px #2b1609;
}
.sign{
  background:#c62828;
  color:white;
  padding:12px;
  border-radius:10px;
  text-align:center;
  font-size:30px;
  font-weight:bold;
  box-shadow:0 5px #681313;
}
.counter{
  background:#b9824a;
  border:8px solid #6b3d1f;
  border-radius:12px;
  margin-top:25px;
  min-height:520px;
  padding:25px;
  position:relative;
}
.shelves{
  display:flex;
  justify-content:space-around;
  background:#3a2414;
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
}
.shelfItem{
  font-size:40px;
  background:#73441f;
  padding:10px;
  border-radius:8px;
}
.ticket{
  width:620px;
  min-height:380px;
  margin:20px auto;
  border-radius:12px;
  padding:20px;
  position:relative;
  background:linear-gradient(135deg,#073b75,#0c63bd);
  border:3px dashed #9bd2ff;
  box-shadow:0 10px 25px #0009;
}
.gold{background:linear-gradient(135deg,#6b4300,#e0a21d)}
.red{background:linear-gradient(135deg,#641313,#dc3d3d)}
.green{background:linear-gradient(135deg,#064b2a,#1aa865)}
.purple{background:linear-gradient(135deg,#33135d,#8e44ad)}
.ticketTitle{
  font-size:42px;
  color:#ffd43b;
  font-weight:900;
  text-shadow:3px 3px #000;
}
.rule{font-size:18px}
.grid{
  display:grid;
  grid-template-columns:repeat(3,110px);
  gap:18px;
  margin-top:25px;
}
.box{
  width:110px;
  height:90px;
  background:#eee;
  color:#111;
  border-radius:50%;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:bold;
}
.box canvas{position:absolute;inset:0}
.info{
  position:absolute;
  top:110px;
  right:20px;
  background:#10294d;
  border:2px solid #74c0fc;
  border-radius:10px;
  padding:15px;
  width:180px;
}
.price{
  position:absolute;
  right:25px;
  bottom:15px;
  font-size:34px;
  font-weight:bold;
}
.cleanArea{
  width:620px;
  height:360px;
  margin:20px auto;
  background:#222;
  border:12px solid #111;
  border-radius:24px;
  position:relative;
  overflow:hidden;
}
.window{
  position:absolute;
  inset:25px;
  background:#74c0fc;
  border-radius:18px;
  overflow:hidden;
}
.dirt{
  position:absolute;
  width:70px;
  height:70px;
  background:#6b3f1e;
  border-radius:50%;
  opacity:.85;
}
.sponge{
  position:absolute;
  font-size:45px;
  pointer-events:none;
  transform:translate(-50%,-50%);
  display:none;
}
.upgrade,.codeBox,.history{
  background:#17263a;
  padding:14px;
  margin:12px 0;
  border-radius:12px;
}
input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:0;
  margin-top:8px;
}
.log{
  background:#0b111c;
  padding:10px;
  border-radius:8px;
  margin:8px 0;
}
.resultAnim{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:70px;
  font-weight:900;
  z-index:99;
  background:#0009;
  animation:pop .6s ease;
}
@keyframes pop{
  0%{transform:scale(.3);opacity:0}
  60%{transform:scale(1.2);opacity:1}
  100%{transform:scale(1)}
}
@media(max-width:1100px){
  .game{grid-template-columns:1fr}
  .ticket,.cleanArea{width:100%}
}
</style>
</head>
<body>

<div class="resultAnim" id="anim"></div>

<div class="game">

<aside class="left">
  <div class="money">🪙 <span id="money">76</span> €</div>
  <p>Niveau <span id="level">1</span> — XP <span id="xp">0</span>/100</p>

  <button class="tab" onclick="mode='tickets';render()">Tickets</button>
  <button class="tab" onclick="mode='clean';render()">Nettoyage</button>

  <h3>Tickets du tabac</h3>
  <div id="ticketList"></div>
</aside>

<main class="main">
  <div class="shop">
    <div class="sign">TABAC — SCRATCH LIFE</div>

    <div class="shelves">
      <div class="shelfItem">🚬</div>
      <div class="shelfItem">📰</div>
      <div class="shelfItem">☕</div>
      <div class="shelfItem">🎟️</div>
      <div class="shelfItem">☎️</div>
    </div>

    <div class="counter" id="center"></div>
  </div>
</main>

<aside class="right">
  <h2>Améliorations</h2>

  <div class="upgrade">
    🍀 <b>Chance</b><br>
    Niveau : <span id="chanceLevel">1</span><br>
    Prix : <span id="chanceCost">500</span>€<br>
    <button onclick="buyChance()">Améliorer</button>
  </div>

  <div class="upgrade">
    🧽 <b>Nettoyage</b><br>
    Gain : <span id="cleanGain">5</span>€<br>
    Prix : <span id="cleanCost">100</span>€<br>
    <button onclick="buyCleanUpgrade()">Améliorer</button>
  </div>

  <div class="codeBox">
    <b>Code secret</b>
    <input id="codeInput" placeholder="Entre un code">
    <button onclick="useCode()">Valider</button>
  </div>

  <h2>Historique</h2>
  <div id="history"></div>
</aside>

</div>

<script>
let money=76;
let xp=0;
let level=1;
let selected=0;
let mode="tickets";
let chanceLevel=1;
let cleanLevel=1;
let cleanGain=5;
let infiniteMoney=false;
let ticketFinished=false;

const tickets=[
  {name:"Mini Ticket",icon:"🎟️",price:1,max:20,rule:"symbol",level:1,style:""},
  {name:"Doublette ⭐",icon:"2x",price:10,max:2000,rule:"double",level:1,style:""},
  {name:"Trésor",icon:"💰",price:20,max:5000,rule:"chest",level:2,style:"gold"},
  {name:"Numéro Fétiche",icon:"7️⃣",price:30,max:8000,rule:"number",level:3,style:"red"},
  {name:"Coffre d’Or",icon:"🔐",price:50,max:15000,rule:"symbol",level:4,style:"green"},
  {name:"Néon Jackpot",icon:"💎",price:100,max:30000,rule:"double",level:5,style:"purple"}
];

function update(){
  document.getElementById("money").textContent=infiniteMoney?"∞":money;
  document.getElementById("xp").textContent=xp;
  document.getElementById("level").textContent=level;
  document.getElementById("chanceLevel").textContent=chanceLevel;
  document.getElementById("chanceCost").textContent=chanceLevel*500;
  document.getElementById("cleanGain").textContent=cleanGain;
  document.getElementById("cleanCost").textContent=cleanLevel*100;
  renderList();
}

function addHistory(text){
  const div=document.createElement("div");
  div.className="log";
  div.innerHTML=text;
  document.getElementById("history").prepend(div);
}

function anim(text,color){
  const a=document.getElementById("anim");
  a.textContent=text;
  a.style.color=color;
  a.style.display="flex";
  setTimeout(()=>a.style.display="none",1200);
}

function gainXp(n){
  xp+=n;
  if(xp>=100){
    xp-=100;
    level++;
    anim("NIVEAU +1 ⭐","#ffd43b");
    addHistory("⭐ Niveau supérieur : "+level);
  }
}

function renderList(){
  const list=document.getElementById("ticketList");
  list.innerHTML="";
  tickets.forEach((t,i)=>{
    const locked=level<t.level;
    const div=document.createElement("div");
    div.className="item "+(i===selected?"active ":"")+(locked?"locked":"");
    div.onclick=()=>{
      if(locked)return;
      selected=i;
      mode="tickets";
      render();
    };
    div.innerHTML=`
      <div class="icon">${t.icon}</div>
      <div>
        <b>${locked?"Verrouillé":t.name}</b><br>
        ${locked?"Niveau "+t.level+" requis":t.price+" €"}<br>
        Gain max : ${locked?"?":t.max+"€"}
      </div>`;
    list.appendChild(div);
  });
}

function render(){
  if(mode==="clean") renderClean();
  else renderTicket();
  update();
}

function renderTicket(){
  ticketFinished=false;
  const t=tickets[selected];
  const center=document.getElementById("center");

  if(!infiniteMoney && money<t.price){
    center.innerHTML=`<h2>Pas assez d’argent pour ${t.name}</h2><p>Va nettoyer une vitre, petit entrepreneur du trottoir.</p>`;
    return;
  }

  if(!infiniteMoney) money-=t.price;

  const winChance=20+chanceLevel*5;
  const isWin=Math.random()*100<winChance;
  const prize=isWin?Math.floor(Math.random()*t.max)+1:0;
  const values=generateValues(t.rule,isWin,prize);

  center.innerHTML=`
    <div class="ticket ${t.style}">
      <div class="ticketTitle">${t.name}</div>
      <p class="rule">${ruleText(t.rule)}</p>
      <div class="grid" id="grid"></div>
      <div class="info">
        <h3>Gain jusqu’à</h3>
        <h2>${t.max}€</h2>
        <p>Prix : ${t.price}€</p>
        <p>Chance : ${winChance}%</p>
      </div>
      <div class="price">${t.price}€</div>
    </div>
    <p>Gratte directement les zones grises.</p>
  `;

  const grid=document.getElementById("grid");
  values.forEach(v=>{
    const box=document.createElement("div");
    box.className="box";
    box.innerHTML=`<span>${v}</span>`;
    const c=document.createElement("canvas");
    c.width=110;
    c.height=90;
    box.appendChild(c);
    grid.appendChild(box);
    setupScratch(c,prize,t);
  });

  addHistory("🎟️ Ticket acheté : "+t.name+" (-"+t.price+"€)");
  update();
}

function ruleText(rule){
  if(rule==="symbol")return"Trouvez 3 symboles identiques.";
  if(rule==="double")return"Trouvez 2 sommes identiques.";
  if(rule==="number")return"Trouvez le numéro gagnant.";
  if(rule==="chest")return"Trouvez la clé du coffre.";
}

function generateValues(rule,isWin,prize){
  if(rule==="symbol"){
    if(isWin)return["👑","👑","👑","🍀","⭐","💎"];
    return["🍀","⭐","💎","🔔","👑","🍒"];
  }
  if(rule==="double"){
    if(isWin)return[prize+"€",prize+"€","10€","20€","50€","100€"];
    return["5€","10€","20€","50€","100€","200€"];
  }
  if(rule==="number"){
    let n=Math.floor(Math.random()*9)+1;
    if(isWin)return["N° "+n,n,"2","4","6","8"];
    return["N° "+n,"1","3","5","7","9"];
  }
  if(rule==="chest"){
    if(isWin)return["🔑","💰","💰","❌","❌","❌"];
    return["❌","💰","❌","💰","❌","💰"];
  }
}

function setupScratch(canvas,prize,ticket){
  const ctx=canvas.getContext("2d");
  ctx.fillStyle="#bbb";
  ctx.fillRect(0,0,110,90);
  ctx.fillStyle="#777";
  ctx.font="30px Arial";
  ctx.fillText("?",47,55);
  ctx.globalCompositeOperation="destination-out";

  function scratch(x,y){
    ctx.beginPath();
    ctx.arc(x,y,18,0,Math.PI*2);
    ctx.fill();
    checkTicket(prize,ticket);
  }

  canvas.addEventListener("mousemove",e=>{
    if(e.buttons!==1)return;
    const r=canvas.getBoundingClientRect();
    scratch(e.clientX-r.left,e.clientY-r.top);
  });

  canvas.addEventListener("touchmove",e=>{
    e.preventDefault();
    const r=canvas.getBoundingClientRect();
    const touch=e.touches[0];
    scratch(touch.clientX-r.left,touch.clientY-r.top);
  },{passive:false});
}

function checkTicket(prize,ticket){
  if(ticketFinished)return;

  const canvases=[...document.querySelectorAll(".box canvas")];
  let total=0;

  canvases.forEach(c=>{
    const ctx=c.getContext("2d");
    const data=ctx.getImageData(0,0,110,90).data;
    let clear=0;
    for(let i=3;i<data.length;i+=4){
      if(data[i]===0)clear++;
    }
    if(clear/(110*90)*100>55){
      c.style.display="none";
      total++;
    }
  });

  if(total===canvases.length){
    ticketFinished=true;

    if(prize>0){
      money+=prize;
      gainXp(20);
      anim("GAGNÉ +" + prize + "€","lime");
      addHistory("✅ "+ticket.name+" : gagné +"+prize+"€");
    }else{
      gainXp(8);
      anim("PERDU","red");
      addHistory("❌ "+ticket.name+" : perdu");
    }

    update();
  }
}

function renderClean(){
  const center=document.getElementById("center");
  center.innerHTML=`
    <h2>Nettoyage de vitre</h2>
    <p>Maintiens la souris ou ton doigt et frotte les taches.</p>
    <div class="cleanArea" id="cleanArea">
      <div class="window" id="window"></div>
      <div class="sponge" id="sponge">🧽</div>
    </div>
  `;

  const w=document.getElementById("window");
  for(let i=0;i<18;i++){
    const d=document.createElement("div");
    d.className="dirt";
    d.style.left=Math.random()*500+"px";
    d.style.top=Math.random()*250+"px";
    w.appendChild(d);
  }

  const area=document.getElementById("cleanArea");
  const sponge=document.getElementById("sponge");

  function cleanAt(x,y){
    sponge.style.display="block";
    sponge.style.left=x+"px";
    sponge.style.top=y+"px";

    document.querySelectorAll(".dirt").forEach(d=>{
      const rect=d.getBoundingClientRect();
      const ar=area.getBoundingClientRect();
      const dx=(rect.left-ar.left+35)-x;
      const dy=(rect.top-ar.top+35)-y;
      if(Math.sqrt(dx*dx+dy*dy)<55)d.remove();
    });

    if(document.querySelectorAll(".dirt").length===0){
      money+=cleanGain;
      gainXp(5);
      anim("VITRE PROPRE +" + cleanGain + "€","#51cf66");
      addHistory("🧽 Vitre nettoyée : +"+cleanGain+"€");
      setTimeout(renderClean,900);
      update();
    }
  }

  area.addEventListener("mousemove",e=>{
    if(e.buttons!==1)return;
    const r=area.getBoundingClientRect();
    cleanAt(e.clientX-r.left,e.clientY-r.top);
  });

  area.addEventListener("touchmove",e=>{
    e.preventDefault();
    const r=area.getBoundingClientRect();
    const t=e.touches[0];
    cleanAt(t.clientX-r.left,t.clientY-r.top);
  },{passive:false});
}

function buyChance(){
  const cost=chanceLevel*500;
  if(!infiniteMoney && money<cost){
    addHistory("❌ Pas assez d’argent.");
    return;
  }
  if(!infiniteMoney)money-=cost;
  chanceLevel++;
  anim("CHANCE +1 🍀","#51cf66");
  update();
}

function buyCleanUpgrade(){
  const cost=cleanLevel*100;
  if(!infiniteMoney && money<cost){
    addHistory("❌ Pas assez d’argent.");
    return;
  }
  if(!infiniteMoney)money-=cost;
  cleanLevel++;
  cleanGain+=5;
  anim("NETTOYAGE +1 🧽","#74c0fc");
  update();
}

function useCode(){
  const code=document.getElementById("codeInput").value;
  if(code==="3000"){
    infiniteMoney=true;
    anim("ARGENT INFINI 💸","#ffd43b");
    addHistory("💸 Code 3000 activé : argent infini.");
  }else{
    anim("CODE FAUX","red");
  }
  update();
}

render();
</script>

</body>
</html>
